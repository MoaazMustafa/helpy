# EAS Update — push JS-only changes to the latest build of the matching channel.
# Runs on every push to master so devices on the "preview" channel get the
# latest JS bundle without rebuilding the native app.
name: EAS Update

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Publish update
        run: eas update --channel ${{ github.event.inputs.channel || 'preview' }} --message "${{ github.event.head_commit.message || github.event.inputs.channel }}" --non-interactive
